<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Shop Pijama</title>
  <style>
    body {
      font-family: Arial;
      margin: 0;
      background: #fff5f7;
    }
    header {
      background: pink;
      padding: 15px;
      text-align: center;
      font-size: 24px;
      font-weight: bold;
    }
    .container {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      padding: 20px;
    }
    .product {
      background: white;
      padding: 10px;
      border-radius: 10px;
      text-align: center;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }
    .product img {
      width: 100%;
      border-radius: 10px;
    }
    button {
      background: hotpink;
      color: white;
      border: none;
      padding: 10px;
      margin-top: 10px;
      cursor: pointer;
      border-radius: 5px;
    }
    button:hover {
      background: deeppink;
    }
    footer {
      text-align: center;
      padding: 10px;
      background: pink;
    }
  </style>
</head>
<body>

<header>
  🛍️ Shop Pijama Xinh Xắn
</header>

<div class="container">

  <div class="product">
    <img src="https://via.placeholder.com/200" alt="">
    <h3>Pijama Dễ Thương</h3>
    <p>150.000đ</p>
    <button onclick="buy()">Mua ngay</button>
  </div>

  <div class="product">
    <img src="https://via.placeholder.com/200" alt="">
    <h3>Pijama Lụa</h3>
    <p>250.000đ</p>
    <button onclick="buy()">Mua ngay</button>
  </div>

  <div class="product">
    <img src="https://via.placeholder.com/200" alt="">
    <h3>Pijama Hàn Quốc</h3>
    <p>200.000đ</p>
    <button onclick="buy()">Mua ngay</button>
  </div>

</div>

<footer>
  📞 Liên hệ: 0123 456 789 | Facebook: Shop của bạn
</footer>

<script>
  function buy() {
    alert("Bạn đã bấm mua hàng! Hãy chỉnh sửa chức năng này sau.");
  }
</script>

</body>
</html>
